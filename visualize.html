<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualize Trạm Quan Trắc Chất Lượng Nước - China</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }
        .info-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2); max-width: 250px;
        }
        h4 { margin: 0 0 10px; color: #333; }
        .legend { line-height: 18px; color: #555; }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.7; }
        .hint {
            margin-top: 8px;
            padding: 8px;
            border-radius: 6px;
            background: #fff4e5;
            color: #7a4f01;
            font-size: 12px;
            line-height: 1.4;
        }
        .control-block {
            margin-top: 10px;
            font-size: 13px;
            color: #2f3a4a;
        }
        .control-block label {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .control-block select {
            width: 100%;
            padding: 6px;
            border: 1px solid #ccd3dd;
            border-radius: 6px;
            background: #ffffff;
        }
        .cluster-legend {
            margin-top: 8px;
            font-size: 12px;
            line-height: 1.5;
            color: #334155;
        }
        .cluster-legend i {
            width: 12px;
            height: 12px;
            display: inline-block;
            border-radius: 50%;
            margin-right: 6px;
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h4>Trạm Quan Trắc (1980-2022)</h4>
        <div class="legend">
            <p><i style="background: #4CAF50; border-radius: 50%;"></i> Cluster 0</p>
            <p><i style="background: #FFC107; border-radius: 50%;"></i> Cluster 1</p>
            <p><i style="background: #F44336; border-radius: 50%;"></i> Cluster 2</p>
        </div>
        <hr>
        <p><small id="stats">Đang tải dữ liệu trạm...</small></p>
        <div class="control-block">
            <label for="datasetFilter">Lọc theo nhóm trạm</label>
            <select id="datasetFilter">
                <option value="all">Tất cả</option>
                <option value="land">Đất liền</option>
                <option value="ocean">Đại dương</option>
            </select>

            <label for="locationFilter">Lọc theo location</label>
            <select id="locationFilter">
                <option value="all">Tất cả location</option>
            </select>

            <label for="yearMonthFilter">Lọc theo tháng/năm</label>
            <select id="yearMonthFilter">
                <option value="all">Tất cả</option>
            </select>
            <div id="clusterStats" class="cluster-legend">Đang tải cụm...</div>
        </div>
        <!-- <div class="hint">
            Nếu thấy "Access blocked", hãy mở bằng local server:<br>
            <b>python -m http.server 8000</b><br>
            rồi vào <b>http://localhost:8000/visualize.html</b>
        </div> -->
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./station_points.js"></script>

    <script>
        var map = L.map('map', {
            preferCanvas: true
        }).setView([35.0, 105.0], 4);

        var datasetFilterEl = document.getElementById('datasetFilter');
        var locationFilterEl = document.getElementById('locationFilter');
        var yearMonthFilterEl = document.getElementById('yearMonthFilter');
        var clusterStatsEl = document.getElementById('clusterStats');
        var stationIndex = {};
        var allClusterRows = [];
        var CLUSTER_COLORS = {
            0: '#4CAF50',
            1: '#FFC107',
            2: '#F44336'
        };

        var esriStreet = L.tileLayer(
            'https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',
            {
                attribution: '&copy; Esri'
            }
        );

        var cartoLight = L.tileLayer(
            'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
            {
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 20
            }
        );

        var osm = L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            {
                attribution: '&copy; OpenStreetMap contributors'
            }
        );

        esriStreet.addTo(map);

        var landLayer = L.layerGroup().addTo(map);
        var oceanLayer = L.layerGroup().addTo(map);

        function markerStyleByCluster(clusterId) {
            var c = CLUSTER_COLORS[clusterId];
            return {
                color: c || '#64748b',
                fillColor: c || '#64748b',
                fillOpacity: 0.75,
                radius: 5
            };
        }

        function csvToObjects(csvText) {
            var lines = csvText.trim().split(/\r?\n/);
            if (!lines.length) {
                return [];
            }
            var headers = lines[0].split(',');
            var startIdx = headers[0] === '' ? 1 : 0;
            var rows = [];

            for (var i = 1; i < lines.length; i++) {
                var parts = lines[i].split(',');
                if (parts.length < headers.length - startIdx) {
                    continue;
                }

                var row = {};
                for (var j = startIdx; j < headers.length; j++) {
                    var key = headers[j];
                    // Keep header/value indices aligned even when the first header is empty.
                    var partIndex = j;
                    row[key] = parts[partIndex];
                }
                rows.push(row);
            }
            return rows;
        }

        function normalizeClusterRows(rows, type) {
            return rows
                .map(function(row) {
                    var date = row.MonitoringDate || '';
                    var dateParts = date.split('-');
                    var yearFromDate = Number(dateParts[0]);
                    var monthFromDate = Number(dateParts[1]);
                    var monthValue = Number(row.month);
                    var month = Number.isFinite(monthValue) && monthValue >= 1 && monthValue <= 12 ? monthValue : monthFromDate;

                    return {
                        type: type,
                        stationId: String(row.MonitoringLocationIdentifier),
                        year: Number.isFinite(yearFromDate) ? yearFromDate : null,
                        month: Number.isFinite(month) ? month : null,
                        cluster: Number(row.cluster_kmeans_3),
                        CODMn: type === 'land' ? (Number.isFinite(Number(row.CODMn)) ? Number(row.CODMn) : null) : null,
                        DO: Number.isFinite(Number(row.DO)) ? Number(row.DO) : null,
                        NH4N: type === 'land' ? (Number.isFinite(Number(row.NH4N)) ? Number(row.NH4N) : null) : null,
                        pH: Number.isFinite(Number(row.pH)) ? Number(row.pH) : null,
                        COD: type === 'ocean' ? (Number.isFinite(Number(row.COD)) ? Number(row.COD) : null) : null,
                        DIN: type === 'ocean' ? (Number.isFinite(Number(row.DIN)) ? Number(row.DIN) : null) : null,
                        DIP: type === 'ocean' ? (Number.isFinite(Number(row.DIP)) ? Number(row.DIP) : null) : null,
                        TPH: type === 'ocean' ? (Number.isFinite(Number(row.TPH)) ? Number(row.TPH) : null) : null
                    };
                })
                .filter(function(r) {
                    return r.stationId && Number.isFinite(r.cluster) && Number.isFinite(r.year) && Number.isFinite(r.month);
                });
        }

        function buildStationIndex(stations) {
            stationIndex = {};
            stations.forEach(function(station) {
                stationIndex[String(station.id)] = station;
            });
        }

        function fillFilterOptions(rows) {
            var months = {};
            var years = {};
            rows.forEach(function(row) {
                var m = Number(row.month);
                var y = Number(row.year);
                if (Number.isFinite(m) && m >= 1 && m <= 12) {
                    months[m] = true;
                }
                if (Number.isFinite(y) && y > 1900) {
                    years[y] = true;
                }
            });

            Object.keys(months)
                .map(function(v) { return Number(v); })
                .sort(function(a, b) { return a - b; })
                .forEach(function(month) {
                    var option = document.createElement('option');
                    option.value = String(month);
                    option.textContent = 'Tháng ' + month;
                    monthFilterEl.appendChild(option);
                });

            Object.keys(years)
                .map(function(v) { return Number(v); })
                .sort(function(a, b) { return a - b; })
                .forEach(function(year) {
                    var option = document.createElement('option');
                    option.value = String(year);
                    option.textContent = String(year);
                    yearFilterEl.appendChild(option);
                });
        }

        function updateYearMonthOptions(rows) {
            // Clear existing options except "all"
            while (yearMonthFilterEl.children.length > 1) {
                yearMonthFilterEl.removeChild(yearMonthFilterEl.lastChild);
            }
            var yearMonths = new Set();
            rows.forEach(function(row) {
                if (Number.isFinite(row.year) && Number.isFinite(row.month)) {
                    yearMonths.add(row.month + '/' + row.year);
                }
            });
            Array.from(yearMonths).sort(function(a, b) {
                var [ma, ya] = a.split('/').map(Number);
                var [mb, yb] = b.split('/').map(Number);
                if (ya !== yb) return ya - yb;
                return ma - mb;
            }).forEach(function(ym) {
                var option = document.createElement('option');
                option.value = ym;
                option.textContent = ym;
                yearMonthFilterEl.appendChild(option);
            });
        }

        function getFilteredRows() {
            var selectedDataset = datasetFilterEl.value;
            var selectedLocation = locationFilterEl.value;
            var rows = allClusterRows;
            if (selectedDataset !== 'all') {
                rows = rows.filter(function(row) { return row.type === selectedDataset; });
            }
            if (selectedLocation !== 'all') {
                rows = rows.filter(function(row) {
                    var station = stationIndex[row.stationId];
                    return station && station.location === selectedLocation;
                });
            }
            return rows;
        }

        function fillLocationOptions(stations) {
            var locations = new Set();
            stations.forEach(function(station) {
                if (station.location) {
                    locations.add(station.location);
                }
            });
            Array.from(locations).sort().forEach(function(loc) {
                var option = document.createElement('option');
                option.value = loc;
                option.textContent = loc;
                locationFilterEl.appendChild(option);
            });
        }

        function pickMajorityCluster(clusterCounts) {
            var bestCluster = null;
            var bestCount = -1;
            Object.keys(clusterCounts).forEach(function(clusterKey) {
                var cnt = clusterCounts[clusterKey];
                if (cnt > bestCount) {
                    bestCount = cnt;
                    bestCluster = Number(clusterKey);
                }
            });
            return bestCluster;
        }

        function renderClusters() {
            var selectedDataset = datasetFilterEl.value;
            var selectedLocation = locationFilterEl.value;
            var selectedYearMonth = yearMonthFilterEl.value;

            landLayer.clearLayers();
            oceanLayer.clearLayers();

            var rows = allClusterRows;
            if (selectedDataset !== 'all') {
                rows = rows.filter(function(row) { return row.type === selectedDataset; });
            }
            if (selectedLocation !== 'all') {
                rows = rows.filter(function(row) {
                    var station = stationIndex[row.stationId];
                    return station && station.location === selectedLocation;
                });
            }
            if (selectedYearMonth !== 'all') {
                var parts = selectedYearMonth.split('/');
                var m = Number(parts[0]);
                var y = Number(parts[1]);
                rows = rows.filter(function(row) { return row.year === y && row.month === m; });
            }

            var stationClusterVotes = {};
            rows.forEach(function(row) {
                var stationKey = row.type + '_' + row.stationId;
                if (!stationKey || !Number.isFinite(row.cluster)) {
                    return;
                }
                if (!stationClusterVotes[stationKey]) {
                    stationClusterVotes[stationKey] = {
                        type: row.type,
                        stationId: row.stationId,
                        votes: {}
                    };
                }
                if (!stationClusterVotes[stationKey].votes[row.cluster]) {
                    stationClusterVotes[stationKey].votes[row.cluster] = 0;
                }
                stationClusterVotes[stationKey].votes[row.cluster] += 1;
            });

            var stationAverages = {};
            rows.forEach(function(row) {
                var stationKey = row.type + '_' + row.stationId;
                if (!stationAverages[stationKey]) {
                    stationAverages[stationKey] = {
                        CODMn: [], DO: [], NH4N: [], pH: [], COD: [], DIN: [], DIP: [], TPH: []
                    };
                }
                if (row.CODMn !== null) stationAverages[stationKey].CODMn.push(row.CODMn);
                if (row.DO !== null) stationAverages[stationKey].DO.push(row.DO);
                if (row.NH4N !== null) stationAverages[stationKey].NH4N.push(row.NH4N);
                if (row.pH !== null) stationAverages[stationKey].pH.push(row.pH);
                if (row.COD !== null) stationAverages[stationKey].COD.push(row.COD);
                if (row.DIN !== null) stationAverages[stationKey].DIN.push(row.DIN);
                if (row.DIP !== null) stationAverages[stationKey].DIP.push(row.DIP);
                if (row.TPH !== null) stationAverages[stationKey].TPH.push(row.TPH);
            });

            var clusterCounts = {
                land: { 0: 0, 1: 0, 2: 0 },
                ocean: { 0: 0, 1: 0, 2: 0 }
            };
            var bounds = L.latLngBounds([]);
            Object.keys(stationClusterVotes).forEach(function(stationKey) {
                var grouped = stationClusterVotes[stationKey];
                var stationType = grouped.type;
                var stationId = grouped.stationId;
                var station = stationIndex[stationId];
                if (!station || station.type !== stationType) {
                    return;
                }

                var clusterId = pickMajorityCluster(grouped.votes);
                if (!Number.isFinite(clusterId)) {
                    return;
                }
                if (clusterCounts[stationType][clusterId] === undefined) {
                    clusterCounts[stationType][clusterId] = 0;
                }
                clusterCounts[stationType][clusterId] += 1;

                var avg = stationAverages[stationKey];
                var avgCODMn = avg.CODMn.length ? (avg.CODMn.reduce((a,b)=>a+b,0)/avg.CODMn.length).toFixed(2) : 'N/A';
                var avgDO = avg.DO.length ? (avg.DO.reduce((a,b)=>a+b,0)/avg.DO.length).toFixed(2) : 'N/A';
                var avgNH4N = avg.NH4N.length ? (avg.NH4N.reduce((a,b)=>a+b,0)/avg.NH4N.length).toFixed(2) : 'N/A';
                var avgpH = avg.pH.length ? (avg.pH.reduce((a,b)=>a+b,0)/avg.pH.length).toFixed(2) : 'N/A';
                var avgCOD = avg.COD.length ? (avg.COD.reduce((a,b)=>a+b,0)/avg.COD.length).toFixed(2) : 'N/A';
                var avgDIN = avg.DIN.length ? (avg.DIN.reduce((a,b)=>a+b,0)/avg.DIN.length).toFixed(2) : 'N/A';
                var avgDIP = avg.DIP.length ? (avg.DIP.reduce((a,b)=>a+b,0)/avg.DIP.length).toFixed(2) : 'N/A';
                var avgTPH = avg.TPH.length ? (avg.TPH.reduce((a,b)=>a+b,0)/avg.TPH.length).toFixed(2) : 'N/A';

                var marker = L.circleMarker([station.lat, station.lon], markerStyleByCluster(clusterId));
                var popupContent = '<b>ID trạm:</b> ' + stationId + '<br>' +
                    '<b>Loại:</b> ' + toTypeLabel(stationType) + '<br>' +
                    '<b>Location:</b> ' + (station.location || 'N/A') + '<br>' +
                    '<b>cluster_agglomerative_3:</b> ' + clusterId + '<br>' +
                    '<b>Tọa độ:</b> ' + Number(station.lat).toFixed(5) + ', ' + Number(station.lon).toFixed(5);
                if (stationType === 'land') {
                    popupContent += '<br><b>CODMn:</b> ' + avgCODMn + '<br><b>DO:</b> ' + avgDO + '<br><b>NH4N:</b> ' + avgNH4N + '<br><b>pH:</b> ' + avgpH;
                } else {
                    popupContent += '<br><b>COD:</b> ' + avgCOD + '<br><b>DIN:</b> ' + avgDIN + '<br><b>DIP:</b> ' + avgDIP + '<br><b>DO:</b> ' + avgDO + '<br><b>TPH:</b> ' + avgTPH + '<br><b>pH:</b> ' + avgpH;
                }
                marker.bindPopup(popupContent);
                if (stationType === 'land') {
                    marker.addTo(landLayer);
                } else {
                    marker.addTo(oceanLayer);
                }
                bounds.extend([station.lat, station.lon]);
            });

            clusterStatsEl.innerHTML =
                '<div><b>Đất liền</b></div>' +
                '<div><i style="background:' + CLUSTER_COLORS[0] + '"></i> C0: <b>' + (clusterCounts.land[0] || 0) + '</b> trạm</div>' +
                '<div><i style="background:' + CLUSTER_COLORS[1] + '"></i> C1: <b>' + (clusterCounts.land[1] || 0) + '</b> trạm</div>' +
                '<div><i style="background:' + CLUSTER_COLORS[2] + '"></i> C2: <b>' + (clusterCounts.land[2] || 0) + '</b> trạm</div>' +
                '<div style="margin-top:6px;"><b>Đại dương</b></div>' +
                '<div><i style="background:' + CLUSTER_COLORS[0] + '"></i> C0: <b>' + (clusterCounts.ocean[0] || 0) + '</b> trạm</div>' +
                '<div><i style="background:' + CLUSTER_COLORS[1] + '"></i> C1: <b>' + (clusterCounts.ocean[1] || 0) + '</b> trạm</div>' +
                '<div><i style="background:' + CLUSTER_COLORS[2] + '"></i> C2: <b>' + (clusterCounts.ocean[2] || 0) + '</b> trạm</div>';

            if (bounds.isValid()) {
                map.fitBounds(bounds.pad(0.08));
            }
        }

        async function loadClusterData(filePath, type) {
            var res = await fetch(filePath);
            if (!res.ok) {
                throw new Error('Không đọc được file ' + filePath);
            }
            var csvText = await res.text();
            var rows = csvToObjects(csvText);
            return normalizeClusterRows(rows, type);
        }

        function toTypeLabel(type) {
            return type === 'land' ? 'Đất liền' : 'Đại dương';
        }

        async function loadStations() {
            var statsEl = document.getElementById('stats');
            try {
                var payload = window.STATION_PAYLOAD;
                if (!payload) {
                    var res = await fetch('./station_points.json');
                    if (!res.ok) {
                        throw new Error('Không đọc được file station_points.json');
                    }
                    payload = await res.json();
                }
                var stations = payload.stations || [];
                buildStationIndex(stations);
                fillLocationOptions(stations);

                L.control.layers({
                    'Esri Street': esriStreet,
                    'Carto Light': cartoLight,
                    'OpenStreetMap': osm
                }, {
                    'Trạm Đất liền (Weekly)': landLayer,
                    'Trạm Đại dương (Monthly)': oceanLayer
                }, {
                    collapsed: false
                }).addTo(map);

                var clusterData = await Promise.all([
                    loadClusterData('./dataset/WaterQuality_Clustered_Results.csv', 'land'),
                    loadClusterData('./dataset/OceanQuality_Clustered_Results.csv', 'ocean')
                ]);
                allClusterRows = clusterData[0].concat(clusterData[1]);

                updateYearMonthOptions(allClusterRows);

                datasetFilterEl.addEventListener('change', function() {
                    yearMonthFilterEl.value = 'all';
                    updateYearMonthOptions(getFilteredRows());
                    renderClusters();
                });
                locationFilterEl.addEventListener('change', function() {
                    yearMonthFilterEl.value = 'all';
                    updateYearMonthOptions(getFilteredRows());
                    renderClusters();
                });
                yearMonthFilterEl.addEventListener('change', renderClusters);

                renderClusters();

                statsEl.innerHTML =
                    'Tổng trạm: <b>' + (payload.totalStations || stations.length) + '</b><br>' +
                    'Đất liền: <b>' + (payload.landStations || 0) + '</b><br>' +
                    'Đại dương: <b>' + (payload.oceanStations || 0) + '</b>';
            } catch (err) {
                statsEl.textContent = 'Lỗi tải dữ liệu: ' + err.message;
                console.error(err);
            }
        }

        loadStations();
    </script>
</body>
</html>
