<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualize Trạm Quan Trắc Chất Lượng Nước - China</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }
        .info-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2); max-width: 250px;
        }
        h4 { margin: 0 0 10px; color: #333; }
        .legend { line-height: 18px; color: #555; }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.7; }
        .hint {
            margin-top: 8px;
            padding: 8px;
            border-radius: 6px;
            background: #fff4e5;
            color: #7a4f01;
            font-size: 12px;
            line-height: 1.4;
        }
        .control-block {
            margin-top: 10px;
            font-size: 13px;
            color: #2f3a4a;
        }
        .control-block label {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .control-block select {
            width: 100%;
            padding: 6px;
            border: 1px solid #ccd3dd;
            border-radius: 6px;
            background: #ffffff;
        }
        .cluster-legend {
            margin-top: 8px;
            font-size: 12px;
            line-height: 1.5;
            color: #334155;
        }
        .cluster-legend i {
            width: 12px;
            height: 12px;
            display: inline-block;
            border-radius: 50%;
            margin-right: 6px;
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h4>Trạm Quan Trắc (1980-2022)</h4>
        <div class="legend">
            <p><i style="background: #f97316; border-radius: 50%;"></i> Cluster 0</p>
            <p><i style="background: #0ea5e9; border-radius: 50%;"></i> Cluster 1</p>
            <p><i style="background: #22c55e; border-radius: 50%;"></i> Cluster 2</p>
        </div>
        <hr>
        <p><small id="stats">Đang tải dữ liệu trạm...</small></p>
        <div class="control-block">
            <label for="datasetFilter">Lọc theo nhóm trạm</label>
            <select id="datasetFilter">
                <option value="all">Tất cả</option>
                <option value="land">Đất liền</option>
                <option value="ocean">Đại dương</option>
            </select>

            <label for="yearFilter">Lọc theo năm</label>
            <select id="yearFilter">
                <option value="all">Tất cả năm</option>
            </select>

            <label for="monthFilter">Lọc theo tháng</label>
            <select id="monthFilter">
                <option value="all">Tất cả tháng</option>
            </select>
            <div id="clusterStats" class="cluster-legend">Đang tải cụm...</div>
        </div>
        <!-- <div class="hint">
            Nếu thấy "Access blocked", hãy mở bằng local server:<br>
            <b>python -m http.server 8000</b><br>
            rồi vào <b>http://localhost:8000/visualize.html</b>
        </div> -->
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./station_points.js"></script>

    <script>
        var map = L.map('map', {
            preferCanvas: true
        }).setView([35.0, 105.0], 4);

        var datasetFilterEl = document.getElementById('datasetFilter');
        var yearFilterEl = document.getElementById('yearFilter');
        var monthFilterEl = document.getElementById('monthFilter');
        var clusterStatsEl = document.getElementById('clusterStats');
        var stationIndex = {};
        var allClusterRows = [];
        var CLUSTER_COLORS = {
            0: '#f97316',
            1: '#0ea5e9',
            2: '#22c55e'
        };

        var esriStreet = L.tileLayer(
            'https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',
            {
                attribution: '&copy; Esri'
            }
        );

        var cartoLight = L.tileLayer(
            'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
            {
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 20
            }
        );

        var osm = L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            {
                attribution: '&copy; OpenStreetMap contributors'
            }
        );

        esriStreet.addTo(map);

        var landLayer = L.layerGroup().addTo(map);
        var oceanLayer = L.layerGroup().addTo(map);

        function markerStyleByCluster(clusterId) {
            var c = CLUSTER_COLORS[clusterId];
            return {
                color: c || '#64748b',
                fillColor: c || '#64748b',
                fillOpacity: 0.75,
                radius: 5
            };
        }

        function csvToObjects(csvText) {
            var lines = csvText.trim().split(/\r?\n/);
            if (!lines.length) {
                return [];
            }
            var headers = lines[0].split(',');
            var startIdx = headers[0] === '' ? 1 : 0;
            var rows = [];

            for (var i = 1; i < lines.length; i++) {
                var parts = lines[i].split(',');
                if (parts.length < headers.length - startIdx) {
                    continue;
                }

                var row = {};
                for (var j = startIdx; j < headers.length; j++) {
                    var key = headers[j];
                    // Keep header/value indices aligned even when the first header is empty.
                    var partIndex = j;
                    row[key] = parts[partIndex];
                }
                rows.push(row);
            }
            return rows;
        }

        function normalizeClusterRows(rows, type) {
            return rows
                .map(function(row) {
                    var date = row.MonitoringDate || '';
                    var dateParts = date.split('-');
                    var yearFromDate = Number(dateParts[0]);
                    var monthFromDate = Number(dateParts[1]);
                    var monthValue = Number(row.month);
                    var month = Number.isFinite(monthValue) && monthValue >= 1 && monthValue <= 12 ? monthValue : monthFromDate;

                    return {
                        type: type,
                        stationId: String(row.MonitoringLocationIdentifier),
                        year: Number.isFinite(yearFromDate) ? yearFromDate : null,
                        month: Number.isFinite(month) ? month : null,
                        cluster: Number(row.cluster_agglomerative_3)
                    };
                })
                .filter(function(r) {
                    return r.stationId && Number.isFinite(r.cluster) && Number.isFinite(r.year) && Number.isFinite(r.month);
                });
        }

        function buildStationIndex(stations) {
            stationIndex = {};
            stations.forEach(function(station) {
                stationIndex[String(station.id)] = station;
            });
        }

        function fillFilterOptions(rows) {
            var months = {};
            var years = {};
            rows.forEach(function(row) {
                var m = Number(row.month);
                var y = Number(row.year);
                if (Number.isFinite(m) && m >= 1 && m <= 12) {
                    months[m] = true;
                }
                if (Number.isFinite(y) && y > 1900) {
                    years[y] = true;
                }
            });

            Object.keys(months)
                .map(function(v) { return Number(v); })
                .sort(function(a, b) { return a - b; })
                .forEach(function(month) {
                    var option = document.createElement('option');
                    option.value = String(month);
                    option.textContent = 'Tháng ' + month;
                    monthFilterEl.appendChild(option);
                });

            Object.keys(years)
                .map(function(v) { return Number(v); })
                .sort(function(a, b) { return a - b; })
                .forEach(function(year) {
                    var option = document.createElement('option');
                    option.value = String(year);
                    option.textContent = String(year);
                    yearFilterEl.appendChild(option);
                });
        }

        function pickMajorityCluster(clusterCounts) {
            var bestCluster = null;
            var bestCount = -1;
            Object.keys(clusterCounts).forEach(function(clusterKey) {
                var cnt = clusterCounts[clusterKey];
                if (cnt > bestCount) {
                    bestCount = cnt;
                    bestCluster = Number(clusterKey);
                }
            });
            return bestCluster;
        }

        function renderClusters() {
            var selectedDataset = datasetFilterEl.value;
            var selectedYear = yearFilterEl.value;
            var selectedMonth = monthFilterEl.value;

            landLayer.clearLayers();
            oceanLayer.clearLayers();

            var rows = allClusterRows;
            if (selectedDataset !== 'all') {
                rows = rows.filter(function(row) { return row.type === selectedDataset; });
            }
            if (selectedYear !== 'all') {
                var y = Number(selectedYear);
                rows = rows.filter(function(row) { return row.year === y; });
            }
            if (selectedMonth !== 'all') {
                var m = Number(selectedMonth);
                rows = rows.filter(function(row) { return row.month === m; });
            }

            var stationClusterVotes = {};
            rows.forEach(function(row) {
                var stationKey = row.type + '_' + row.stationId;
                if (!stationKey || !Number.isFinite(row.cluster)) {
                    return;
                }
                if (!stationClusterVotes[stationKey]) {
                    stationClusterVotes[stationKey] = {
                        type: row.type,
                        stationId: row.stationId,
                        votes: {}
                    };
                }
                if (!stationClusterVotes[stationKey].votes[row.cluster]) {
                    stationClusterVotes[stationKey].votes[row.cluster] = 0;
                }
                stationClusterVotes[stationKey].votes[row.cluster] += 1;
            });

            var clusterCounts = {
                land: { 0: 0, 1: 0, 2: 0 },
                ocean: { 0: 0, 1: 0, 2: 0 }
            };
            var bounds = L.latLngBounds([]);
            Object.keys(stationClusterVotes).forEach(function(stationKey) {
                var grouped = stationClusterVotes[stationKey];
                var stationType = grouped.type;
                var stationId = grouped.stationId;
                var station = stationIndex[stationId];
                if (!station || station.type !== stationType) {
                    return;
                }

                var clusterId = pickMajorityCluster(grouped.votes);
                if (!Number.isFinite(clusterId)) {
                    return;
                }
                if (clusterCounts[stationType][clusterId] === undefined) {
                    clusterCounts[stationType][clusterId] = 0;
                }
                clusterCounts[stationType][clusterId] += 1;

                var marker = L.circleMarker([station.lat, station.lon], markerStyleByCluster(clusterId));
                marker.bindPopup(
                    '<b>ID trạm:</b> ' + stationId + '<br>' +
                    '<b>Loại:</b> ' + toTypeLabel(stationType) + '<br>' +
                    '<b>cluster_agglomerative_3:</b> ' + clusterId + '<br>' +
                    '<b>Tọa độ:</b> ' + Number(station.lat).toFixed(5) + ', ' + Number(station.lon).toFixed(5)
                );
                if (stationType === 'land') {
                    marker.addTo(landLayer);
                } else {
                    marker.addTo(oceanLayer);
                }
                bounds.extend([station.lat, station.lon]);
            });

            clusterStatsEl.innerHTML =
                '<div><b>Đất liền</b></div>' +
                '<div><i style="background:' + CLUSTER_COLORS[0] + '"></i> C0: <b>' + (clusterCounts.land[0] || 0) + '</b> trạm</div>' +
                '<div><i style="background:' + CLUSTER_COLORS[1] + '"></i> C1: <b>' + (clusterCounts.land[1] || 0) + '</b> trạm</div>' +
                '<div><i style="background:' + CLUSTER_COLORS[2] + '"></i> C2: <b>' + (clusterCounts.land[2] || 0) + '</b> trạm</div>' +
                '<div style="margin-top:6px;"><b>Đại dương</b></div>' +
                '<div><i style="background:' + CLUSTER_COLORS[0] + '"></i> C0: <b>' + (clusterCounts.ocean[0] || 0) + '</b> trạm</div>' +
                '<div><i style="background:' + CLUSTER_COLORS[1] + '"></i> C1: <b>' + (clusterCounts.ocean[1] || 0) + '</b> trạm</div>' +
                '<div><i style="background:' + CLUSTER_COLORS[2] + '"></i> C2: <b>' + (clusterCounts.ocean[2] || 0) + '</b> trạm</div>';

            if (bounds.isValid()) {
                map.fitBounds(bounds.pad(0.08));
            }
        }

        async function loadClusterData(filePath, type) {
            var res = await fetch(filePath);
            if (!res.ok) {
                throw new Error('Không đọc được file ' + filePath);
            }
            var csvText = await res.text();
            var rows = csvToObjects(csvText);
            return normalizeClusterRows(rows, type);
        }

        function toTypeLabel(type) {
            return type === 'land' ? 'Đất liền (Weekly)' : 'Đại dương (Monthly)';
        }

        async function loadStations() {
            var statsEl = document.getElementById('stats');
            try {
                var payload = window.STATION_PAYLOAD;
                if (!payload) {
                    var res = await fetch('./station_points.json');
                    if (!res.ok) {
                        throw new Error('Không đọc được file station_points.json');
                    }
                    payload = await res.json();
                }
                var stations = payload.stations || [];
                buildStationIndex(stations);

                L.control.layers({
                    'Esri Street (ít bị chặn)': esriStreet,
                    'Carto Light': cartoLight,
                    'OpenStreetMap': osm
                }, {
                    'Trạm Đất liền (Weekly)': landLayer,
                    'Trạm Đại dương (Monthly)': oceanLayer
                }, {
                    collapsed: false
                }).addTo(map);

                var clusterData = await Promise.all([
                    loadClusterData('./dataset/WaterQuality_Clustered_Results.csv', 'land'),
                    loadClusterData('./dataset/OceanQuality_Clustered_Results.csv', 'ocean')
                ]);
                allClusterRows = clusterData[0].concat(clusterData[1]);

                fillFilterOptions(allClusterRows);

                datasetFilterEl.addEventListener('change', renderClusters);
                yearFilterEl.addEventListener('change', renderClusters);
                monthFilterEl.addEventListener('change', renderClusters);

                renderClusters();

                statsEl.innerHTML =
                    'Tổng trạm: <b>' + (payload.totalStations || stations.length) + '</b><br>' +
                    'Đất liền: <b>' + (payload.landStations || 0) + '</b><br>' +
                    'Đại dương: <b>' + (payload.oceanStations || 0) + '</b>';
            } catch (err) {
                statsEl.textContent = 'Lỗi tải dữ liệu: ' + err.message;
                console.error(err);
            }
        }

        loadStations();
    </script>
</body>
</html>
